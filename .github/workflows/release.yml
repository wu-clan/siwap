name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: siwap-macos-arm64.zip
          - os: macos-13
            goos: darwin
            goarch: amd64
            artifact: siwap-macos-amd64.zip
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: siwap-win-amd64.zip
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: siwap-linux-amd64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev xvfb

      - name: Install Windows packaging dependencies
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.91

      - name: Run release script
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCH: ${{ matrix.goarch }}
          WAILS3: wails3
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
          CGO_CFLAGS: ${{ matrix.goos == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
        run: ./scripts/release.sh "${{ github.ref_name }}" "${{ matrix.goarch }}"

      - name: Archive macOS artifact
        if: matrix.goos == 'darwin'
        run: |
          cd bin
          zip -r ../${{ matrix.artifact }} siwap.app

      - name: Archive Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path bin/* -DestinationPath ${{ matrix.artifact }}

      - name: Archive Linux artifact
        if: matrix.goos == 'linux'
        run: tar -czf ${{ matrix.artifact }} -C bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
