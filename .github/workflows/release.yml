name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            target: macos-arm64
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            target: macos-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: win-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev xvfb

      - name: Install Windows packaging dependencies
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.91

      - name: Run release script
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCH: ${{ matrix.goarch }}
          WAILS3: wails3
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
          CGO_CFLAGS: ${{ matrix.goos == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
        run: ./scripts/release.sh "${{ github.ref_name }}" "${{ matrix.goarch }}"

      - name: Archive macOS artifact
        if: matrix.goos == 'darwin'
        run: |
          mkdir -p "dist/${{ github.ref_name }}/${{ matrix.target }}"
          cd bin
          zip -r "../dist/${{ github.ref_name }}/${{ matrix.target }}/siwap-${{ github.ref_name }}-${{ matrix.target }}.zip" siwap.app

      - name: Archive Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ github.ref_name }}/${{ matrix.target }}"
          Compress-Archive -Path bin/* -DestinationPath "dist/${{ github.ref_name }}/${{ matrix.target }}/siwap-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Prepare Linux artifacts
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          out="dist/${{ github.ref_name }}/${{ matrix.target }}"
          mkdir -p "$out"
          tar -czf "$out/siwap-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" -C bin siwap
          cp bin/*.deb "$out/siwap-${{ github.ref_name }}-${{ matrix.target }}.deb"
          cp bin/*.rpm "$out/siwap-${{ github.ref_name }}-${{ matrix.target }}.rpm"
          cp bin/*.pkg.tar.zst "$out/siwap-${{ github.ref_name }}-${{ matrix.target }}.pkg.tar.zst"
          cp bin/*.AppImage "$out/siwap-${{ github.ref_name }}-${{ matrix.target }}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: siwap-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/${{ github.ref_name }}/${{ matrix.target }}/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
