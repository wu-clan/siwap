name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev xvfb

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.91
      - name: Install frontend dependencies
        run: pnpm install
        working-directory: frontend
      - name: Generate bindings
        run: wails3 generate bindings -clean=true -ts ./...
      - name: Frontend build
        run: pnpm build
        working-directory: frontend
      - name: Go tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run go test ./...
      - name: Go tests
        if: runner.os != 'Linux'
        run: go test ./...
      - name: Go build
        run: go build ./...
      - name: Check bindings drift
        run: git diff --exit-code -- frontend/bindings/
